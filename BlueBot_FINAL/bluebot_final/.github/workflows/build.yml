name: Build BlueBot

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:

  # ── Build Windows .exe ─────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer dependances
        run: pip install customtkinter psutil pillow pyinstaller

      - name: Compiler BlueBot.exe
        run: pyinstaller --onefile --windowed --name "BlueBot" --add-data "windows/assets;assets" windows/bluebot.py

      - name: Upload BlueBot.exe
        uses: actions/upload-artifact@v4
        with:
          name: BlueBot-Windows
          path: dist/BlueBot.exe

  # ── Build Android .apk ─────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload BlueBot.apk
        uses: actions/upload-artifact@v4
        with:
          name: BlueBot-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
