name: Build BlueBot.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Telecharger le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: |
          pip install customtkinter psutil pillow pyinstaller

      - name: Construire le .exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "BlueBot" `
            --icon "windows/assets/logo.png" `
            --add-data "windows/assets;assets" `
            windows/bluebot.py

      - name: Uploader le .exe
        uses: actions/upload-artifact@v4
        with:
          name: BlueBot-Windows
          path: dist/BlueBot.exe
          retention-days: 30

      - name: Creer une Release automatique
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/BlueBot.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
